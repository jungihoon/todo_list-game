<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quest Board</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">

  <!-- App Title -->
  <div class="app-title">
    <h1>⚔ QUEST BOARD ⚔</h1>
    <p>할 일은 하고 살자.</p>
  </div>

  <!-- Reset Confirm Modal -->
  <div class="overlay" id="reset-modal" style="display:none;">
    <div class="modal reset-modal">
      <div class="modal-inner">
        <span class="modal-icon">⚠️</span>
        <div class="modal-headline reset-headline">초기화</div>
        <div class="modal-sub">레벨과 EXP가 모두 0으로 초기화됩니다.<br>정말 초기화하시겠습니까?</div>
        <div class="edit-actions">
          <button class="modal-ok reset-confirm-btn" id="reset-confirm-btn">초기화</button>
          <button class="edit-cancel-btn" id="reset-cancel-btn">취소</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Player Card -->
  <div class="player-card">
    <div class="avatar">🧙</div>
    <div class="player-info">
      <div class="player-name-row">
        <span class="player-name">짱구 유치원 원장님</span>
        <span class="player-title-badge" id="title-badge">수련생</span>
        <button class="reset-btn" id="reset-btn" title="레벨 초기화">↺ 초기화</button>
      </div>
      <div class="level-row">레벨 <span id="lv-num">1</span> · 다음 레벨까지 <span id="lv-remain">200</span> EXP</div>
      <div class="exp-label-row">
        <strong>EXP</strong>
        <span id="exp-text">0 / 200</span>
      </div>
      <div class="exp-track">
        <div class="exp-fill" id="exp-fill" style="width:0%"></div>
      </div>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-val" id="total-exp">0</div>
          <div class="stat-lbl">총 EXP</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="cnt-done">0</div>
          <div class="stat-lbl">완료</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="cnt-active">0</div>
          <div class="stat-lbl">진행중</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="cnt-total">0</div>
          <div class="stat-lbl">전체</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Quest -->
  <div class="add-section">
    <div class="section-header">📜 새 퀘스트 추가</div>
    <div class="input-row">
      <input id="quest-input" class="quest-input" type="text" placeholder="퀘스트 내용을 입력하세요..." maxlength="80" />
      <div class="diff-group">
        <button class="diff-btn easy active" data-diff="Easy">🌱 쉬움</button>
        <button class="diff-btn normal"      data-diff="Normal">⚔️ 보통</button>
        <button class="diff-btn hard"        data-diff="Hard">🔥 어려움</button>
      </div>
      <button class="add-btn" id="add-btn">＋ 추가</button>
    </div>
  </div>

  <!-- Filter Tabs -->
  <div class="filters">
    <button class="filter-btn active" data-f="all">전체</button>
    <button class="filter-btn"        data-f="active">진행중</button>
    <button class="filter-btn"        data-f="completed">완료됨</button>
  </div>

  <!-- Quest List -->
  <div class="quest-list" id="quest-list"></div>

</div>

<!-- Edit Quest Modal -->
<div class="overlay" id="edit-modal" style="display:none;">
  <div class="modal edit-modal">
    <div class="modal-inner">
      <span class="modal-icon">✏️</span>
      <div class="modal-headline edit-headline">퀘스트 수정</div>
      <div class="edit-form">
        <input id="edit-input" class="quest-input edit-input" type="text" maxlength="80" placeholder="퀘스트 내용..." />
        <div class="diff-group edit-diff-group">
          <button class="diff-btn easy"   data-edit-diff="Easy">🌱 쉬움</button>
          <button class="diff-btn normal" data-edit-diff="Normal">⚔️ 보통</button>
          <button class="diff-btn hard"   data-edit-diff="Hard">🔥 어려움</button>
        </div>
      </div>
      <div class="edit-actions">
        <button class="modal-ok"      id="edit-save-btn">저장하기</button>
        <button class="edit-cancel-btn" id="edit-cancel-btn">취소</button>
      </div>
    </div>
  </div>
</div>

<!-- Level Up Modal -->
<div class="overlay" id="modal" style="display:none;">
  <div class="modal">
    <div class="modal-inner">
      <span class="modal-icon">🏆</span>
      <div class="modal-headline">LEVEL UP!</div>
      <div class="modal-sub">축하합니다! 레벨이 올랐습니다!</div>
      <div class="modal-level-box">
        <div class="modal-level-num" id="modal-lv">2</div>
        <div class="modal-level-lbl">NEW LEVEL</div>
        <div class="modal-title-txt" id="modal-title">견습 모험가</div>
      </div>
      <button class="modal-ok" id="modal-ok">계속하기 →</button>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
